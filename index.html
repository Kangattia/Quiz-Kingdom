<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Kingdom</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container" id="homeScreen">

<h1>👑 Quiz Kingdom</h1>
<input 
id="playerNameInput" 
type="text" 
placeholder="Enter your kingdom name">
  <div id="playerCard">

<p id="playerTitle">
⚔️ Rank: Kingdom Recruit
</p>

<p id="playerPoints">
🏆 Total Points: 0
</p>

<p id="playerLevels">
📚 Levels Completed: 0
</p>

  </div>
<p class="subtitle">
The Kingdom of Knowledge Awaits
</p>
<p id="selectedText">
Selected: History
</p>
<button id="historyBtn">
🌍 History
</button>

<button id="bibleBtn">
✝️ Bible
</button>

<button id="scienceBtn">
🔬 Science
</button>

<button id="geographyBtn">
🌍 Geography
</button>

<button id="playBtn">
▶ Play
</button>
<button id="rankingBtn">
🏆 Kingdom Rankings
</button>
<p class="version">
Version 0.1
</p>

</div>
  <div class="container" id="rankingScreen" style="display:none;">

<h2>🏆 Kingdom Rankings</h2>

<div id="rankingList">

</div>

<button id="backRankingBtn">
⬅ Back
</button>

  </div>
<div class="container" id="quizScreen" style="display:none;">
<div id="pointsPopup"></div>
<h2 id="categoryTitle">History</h2>
  <button id="backBtn">
🏠 Back
  </button>
<p id="scoreText">
Score: 0
</p>
  
<p id="questionCounter">
Question 1 of 10
</p>
<p id="timerText">
⏱️ Time: 15
</p>
<h3 id="questionText">
Loading question...
</h3>

<button class="answerBtn">Answer A</button>

<button class="answerBtn">Answer B</button>

<button class="answerBtn">Answer C</button>

<button class="answerBtn">Answer D</button>

</div>
  <div class="container" id="resultScreen" style="display:none;">

<div id="reward">
👑
</div>
<div id="confetti"></div>
<h2>🏆 Quiz Complete!</h2>

<p id="finalScore">
Your Score: 0
</p>

<p id="resultMessage">
Great job!
</p>

<button id="restartBtn">
🔄 Play Again
</button>

  </div>
<script src="questions.js"></script>
  <script src="sounds.js"></script>
<script src="script.js"></script>

</body>
</html>
