<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Kingdom</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container" id="homeScreen">

<h1>👑 Quiz Kingdom</h1>

<p class="subtitle">
The Kingdom of Knowledge Awaits
</p>

<button id="historyBtn">
🌍 History
</button>

<button id="bibleBtn">
✝️ Bible
</button>

<button disabled>
🔒 Science (Coming Soon)
</button>

<button disabled>
🔒 Geography (Coming Soon)
</button>

<button id="playBtn">
▶ Play
</button>

<p class="version">
Version 0.1
</p>

</div>
<div class="container" id="quizScreen" style="display:none;">

<h2 id="categoryTitle">History</h2>
<p id="scoreText">
Score: 0
</p>
  
<p id="questionCounter">
Question 1 of 10
</p>

<h3 id="questionText">
Loading question...
</h3>

<button class="answerBtn">Answer A</button>

<button class="answerBtn">Answer B</button>

<button class="answerBtn">Answer C</button>

<button class="answerBtn">Answer D</button>

</div>
  <div class="container" id="resultScreen" style="display:none;">

<div id="reward">
👑
</div>

<h2>🏆 Quiz Complete!</h2>

<p id="finalScore">
Your Score: 0
</p>

<p id="resultMessage">
Great job!
</p>

<button id="restartBtn">
🔄 Play Again
</button>

  </div>
<script src="questions.js"></script>
  <script src="sounds.js"></script>
<script src="script.js"></script>

</body>
</html>
